  function classifyCategory(cat) {
    if (!cat) return 'L';
    var c = cat.charAt(0).toUpperCase();
    if (c === 'L' || cat.toLowerCase().startsWith('logisch')) return 'L';
    if (c === 'P' || cat.toLowerCase().startsWith('physi')) return 'P';
    if (c === 'I' || cat.toLowerCase().startsWith('info')) return 'I';
    if (c === 'S' || cat.toLowerCase().startsWith('struk')) return 'S';
    return 'L';
  }

  var COLORS = { L: '#4488ff', P: '#ff4444', I: '#44ff88', S: '#ffcc44' };
  var LABELS = { L: 'Logisch', P: 'Physikalisch', I: 'Informationell', S: 'Strukturell' };
  var CAT_RGB = {
    L: [0.267, 0.533, 1.0],
    P: [1.0, 0.267, 0.267],
    I: [0.267, 1.0, 0.533],
    S: [1.0, 0.8, 0.267]
  };

  var GOLDEN_ANGLE = 137.508 * Math.PI / 180;

  var DATA = RAW_DATA.map(function(d, i) {
    var cat = classifyCategory(d.category);
    var n = i + 1;
    var r = 2.0 * Math.sqrt(n);
    var theta = n * GOLDEN_ANGLE;
    var y = n * 0.55;
    return {
      idx: i,
      id: d.id,
      cat: cat,
      color: COLORS[cat],
      label: LABELS[cat],
      x: r * Math.cos(theta),
      y: y,
      z: r * Math.sin(theta),
      strength: d.strength || 'moderate',
      branches: d.branch_count || 2,
      doc: (d.document || '').substring(0, 200),
      source: d.source || ''
    };
  });

  var counts = { L: 0, P: 0, I: 0, S: 0 };
  DATA.forEach(function(d) { counts[d.cat]++; });
  document.getElementById('stats').innerHTML =
    '<div>L: ' + counts.L + ' · P: ' + counts.P + ' · I: ' + counts.I + ' · S: ' + counts.S + ' · Σ ' + DATA.length + '</div>' +
    '<div style="margin-top:4px;">Φ-Schnitt bei Indiz #' + Math.round(DATA.length * 0.618) + '</div>';

  var scene, camera, renderer, controls, raycaster, mouse;
  var spheres = [], glowSprites = [];
  var bgParticles, flowParticles, clock;
  var autoRotate = true;

  function createGlowTexture(r, g, b) {
    var size = 128;
    var canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    var ctx = canvas.getContext('2d');
    var gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    gradient.addColorStop(0, 'rgba(' + Math.round(r*255) + ',' + Math.round(g*255) + ',' + Math.round(b*255) + ',1)');
    gradient.addColorStop(0.15, 'rgba(' + Math.round(r*255) + ',' + Math.round(g*255) + ',' + Math.round(b*255) + ',0.6)');
    gradient.addColorStop(0.4, 'rgba(' + Math.round(r*255) + ',' + Math.round(g*255) + ',' + Math.round(b*255) + ',0.15)');
    gradient.addColorStop(1, 'rgba(' + Math.round(r*255) + ',' + Math.round(g*255) + ',' + Math.round(b*255) + ',0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, size, size);
    var tex = new THREE.CanvasTexture(canvas);
    return tex;
  }

  var glowTextures = {};
  Object.keys(CAT_RGB).forEach(function(k) {
    var c = CAT_RGB[k];
    glowTextures[k] = createGlowTexture(c[0], c[1], c[2]);
  });

  function createStarTexture() {
    var size = 64;
    var canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    var ctx = canvas.getContext('2d');
    var gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.1, 'rgba(200,210,255,0.5)');
    gradient.addColorStop(0.5, 'rgba(150,170,255,0.05)');
    gradient.addColorStop(1, 'rgba(100,120,255,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, size, size);
    return new THREE.CanvasTexture(canvas);
  }

  var starTex = createStarTexture();

  function init() {
    clock = new THREE.Clock();
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a14);
    scene.fog = new THREE.FogExp2(0x0a0a14, 0.006);

    camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 600);
    camera.position.set(28, 20, 28);
    camera.lookAt(0, 16, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.04;
    controls.target.set(0, 16, 0);
    controls.minDistance = 10;
    controls.maxDistance = 80;

    raycaster = new THREE.Raycaster();
    raycaster.params.Points = { threshold: 0.5 };
    mouse = new THREE.Vector2(-999, -999);

    createBackground();
    createSpiralTube();
    createDataNodes();
    createFlowParticles();
    createPhiMarker();

    window.addEventListener('resize', onResize);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('click', function() {
      autoRotate = !autoRotate;
      var hint = document.getElementById('rotate-hint');
      hint.textContent = autoRotate ? 'Auto-Rotation AN' : 'Auto-Rotation AUS — Maus zum Drehen';
      hint.style.opacity = '0.7';
      setTimeout(function() { hint.style.opacity = '0.4'; }, 1500);
    });

    animate();
  }

  function createBackground() {
    var count = 4000;
    var geo = new THREE.BufferGeometry();
    var pos = new Float32Array(count * 3);
    var sizes = new Float32Array(count);

    for (var i = 0; i < count; i++) {
      var radius = 60 + Math.random() * 250;
      var theta = Math.random() * Math.PI * 2;
      var phi = Math.acos(2 * Math.random() - 1);
      pos[i*3]     = radius * Math.sin(phi) * Math.cos(theta);
      pos[i*3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
      pos[i*3 + 2] = radius * Math.cos(phi);
      sizes[i] = 0.5 + Math.random() * 2.0;
    }

    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

    var mat = new THREE.PointsMaterial({
      map: starTex,
      size: 1.2,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.6,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      color: 0x8899cc
    });

    bgParticles = new THREE.Points(geo, mat);
    scene.add(bgParticles);
  }

  function createSpiralTube() {
    var spiralPts = DATA.map(function(d) {
      return new THREE.Vector3(d.x, d.y, d.z);
    });
    var curve = new THREE.CatmullRomCurve3(spiralPts, false, 'catmullrom', 0.5);

    var tubeGeo = new THREE.TubeGeometry(curve, 500, 0.08, 8, false);
    var tubeMat = new THREE.MeshBasicMaterial({
      color: 0x334466,
      transparent: true,
      opacity: 0.25
    });
    scene.add(new THREE.Mesh(tubeGeo, tubeMat));

    var tubeGlow = new THREE.TubeGeometry(curve, 500, 0.25, 8, false);
    var tubeGlowMat = new THREE.MeshBasicMaterial({
      color: 0x223355,
      transparent: true,
      opacity: 0.06
    });
    scene.add(new THREE.Mesh(tubeGlow, tubeGlowMat));
  }

  function createDataNodes() {
    DATA.forEach(function(p, i) {
      var baseSize = 0.18 + (p.branches || 2) * 0.03;
      var col = new THREE.Color(p.color);

      var coreGeo = new THREE.SphereGeometry(baseSize * 0.5, 20, 20);
      var coreMat = new THREE.MeshBasicMaterial({
        color: col.clone().multiplyScalar(1.5),
        transparent: true,
        opacity: 0.95
      });
      var core = new THREE.Mesh(coreGeo, coreMat);
      core.position.set(p.x, p.y, p.z);
      core.userData = p;
      scene.add(core);
      spheres.push(core);

      var glowSize = baseSize * (p.strength === 'fundamental' ? 5.0 : 3.5);
      var spriteMat = new THREE.SpriteMaterial({
        map: glowTextures[p.cat],
        transparent: true,
        opacity: 0.7,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      var sprite = new THREE.Sprite(spriteMat);
      sprite.position.set(p.x, p.y, p.z);
      sprite.scale.set(glowSize, glowSize, 1);
      sprite.userData = { baseScale: glowSize, idx: i };
      scene.add(sprite);
      glowSprites.push(sprite);

      if (p.strength === 'fundamental') {
        var ringGeo = new THREE.TorusGeometry(baseSize * 2.5, 0.015, 8, 48);
        var ringMat = new THREE.MeshBasicMaterial({
          color: col,
          transparent: true,
          opacity: 0.12
        });
        var ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.copy(core.position);
        ring.rotation.x = Math.random() * Math.PI;
        ring.rotation.y = Math.random() * Math.PI;
        scene.add(ring);
      }
    });
  }

  function createFlowParticles() {
    var spiralPts = DATA.map(function(d) {
      return new THREE.Vector3(d.x, d.y, d.z);
    });
    var curve = new THREE.CatmullRomCurve3(spiralPts, false, 'catmullrom', 0.5);

    var count = 500;
    var geo = new THREE.BufferGeometry();
    var pos = new Float32Array(count * 3);
    var colors = new Float32Array(count * 3);

    for (var i = 0; i < count; i++) {
      var t = Math.random();
      var pt = curve.getPoint(t);
      var spread = 1.0 + Math.random() * 1.5;
      pos[i*3]     = pt.x + (Math.random() - 0.5) * spread;
      pos[i*3 + 1] = pt.y + (Math.random() - 0.5) * spread;
      pos[i*3 + 2] = pt.z + (Math.random() - 0.5) * spread;
      var dataIdx = Math.min(Math.floor(t * DATA.length), DATA.length - 1);
      var c = CAT_RGB[DATA[dataIdx].cat];
      colors[i*3] = c[0]; colors[i*3+1] = c[1]; colors[i*3+2] = c[2];
    }

    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    var flowTex = createGlowTexture(1, 1, 1);
    var mat = new THREE.PointsMaterial({
      map: flowTex,
      size: 0.6,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.5,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true
    });

    flowParticles = new THREE.Points(geo, mat);
    flowParticles.userData.curve = curve;
    flowParticles.userData.offsets = [];
    flowParticles.userData.speeds = [];
    for (var j = 0; j < count; j++) {
      flowParticles.userData.offsets.push(Math.random());
      flowParticles.userData.speeds.push(0.3 + Math.random() * 0.7);
    }
    scene.add(flowParticles);
  }

  function createPhiMarker() {
    var phiIdx = Math.round(DATA.length * 0.618);
    if (phiIdx >= DATA.length) phiIdx = DATA.length - 1;
    var phiP = DATA[phiIdx];

    var ringGeo = new THREE.TorusGeometry(14, 0.03, 8, 128);
    var ringMat = new THREE.MeshBasicMaterial({
      color: 0x6655ff,
      transparent: true,
      opacity: 0.1
    });
    var ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.set(0, phiP.y, 0);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);
  }

  function onResize() {
    var w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }

  function onMouseMove(e) {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    var intersects = raycaster.intersectObjects(spheres);
    var tt = document.getElementById('tooltip');

    if (intersects.length > 0) {
      var d = intersects[0].object.userData;
      tt.innerHTML =
        '<div class="tt-cat" style="color:' + d.color + '">[' + d.cat + '] ' + d.label + '</div>' +
        '<div style="margin-top:4px"><strong>#' + (d.idx + 1) + '</strong> · ' + d.branches + ' Äste · ' + d.strength + '</div>' +
        '<div style="margin-top:6px;opacity:0.75">' + d.doc + '…</div>' +
        '<div style="margin-top:4px;opacity:0.4;font-size:10px">' + d.id + '</div>';
      tt.style.display = 'block';
      tt.style.left = Math.min(e.clientX + 15, window.innerWidth - 400) + 'px';
      tt.style.top  = Math.min(e.clientY + 15, window.innerHeight - 150) + 'px';
      document.body.style.cursor = 'pointer';
    } else {
      tt.style.display = 'none';
      document.body.style.cursor = 'default';
    }
  }

  function updateFlowParticles(time) {
    if (!flowParticles) return;
    var curve = flowParticles.userData.curve;
    var offsets = flowParticles.userData.offsets;
    var speeds = flowParticles.userData.speeds;
    var posArr = flowParticles.geometry.attributes.position.array;

    for (var i = 0; i < offsets.length; i++) {
      var t = (offsets[i] + time * 0.03 * speeds[i]) % 1;
      var pt = curve.getPoint(t);
      var spread = Math.sin(t * Math.PI) * 1.5;
      var angle = time * 0.5 + i * 0.1;
      posArr[i*3]     = pt.x + Math.cos(angle) * spread * 0.5;
      posArr[i*3 + 1] = pt.y + Math.sin(angle * 0.7) * spread * 0.3;
      posArr[i*3 + 2] = pt.z + Math.sin(angle) * spread * 0.5;
    }
    flowParticles.geometry.attributes.position.needsUpdate = true;
  }

  function animate() {
    requestAnimationFrame(animate);
    var time = clock.getElapsedTime();

    if (autoRotate) {
      var t = time * 0.06;
      var radius = 32 + Math.sin(time * 0.04) * 5;
      camera.position.x = radius * Math.cos(t);
      camera.position.z = radius * Math.sin(t);
      camera.position.y = 20 + Math.sin(time * 0.05) * 8;
      camera.lookAt(0, 16, 0);
    }

    glowSprites.forEach(function(s) {
      var base = s.userData.baseScale;
      var pulse = Math.sin(time * 1.0 + s.userData.idx * 0.5) * 0.12 + 1.0;
      s.scale.set(base * pulse, base * pulse, 1);
    });

    spheres.forEach(function(s, i) {
      var breathe = Math.sin(time * 1.2 + i * 0.7) * 0.15 + 1.0;
      s.scale.setScalar(breathe);
    });

    updateFlowParticles(time);

    controls.update();
    renderer.render(scene, camera);
  }

  init();
})();
</script>
